# Furnihub V1.0 · Railway deployment config
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npx prisma generate && npx next start -p $PORT"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
